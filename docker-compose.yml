services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duality-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/web-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: duality-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
